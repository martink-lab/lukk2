<style>
:root{
  --navy:#0f2244;
  --navy2:#1a3a6b;
  --red:#d42b2b;
  --gold:#f5a623;
  --bg:#f5f7fa;
  --white:#ffffff;
  --border:#dde4f0;
  --txt:#0f1f3d;
  --txt2:#5a6a85;
  --radius:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}

/* ── Hero ── */
.hero{
  background:var(--navy);
  padding:48px 20px 0;
  text-align:center;
  position:relative;
  overflow:hidden;
}
.hero::before{
  content:'';
  position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% 0%, rgba(212,43,43,.18) 0%, transparent 70%);
}
.hero-badge{
  display:inline-flex;align-items:center;gap:7px;
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);
  color:rgba(255,255,255,.75);font-size:.75rem;font-weight:600;letter-spacing:.08em;
  padding:5px 14px;border-radius:50px;margin-bottom:20px;
}
.hero h1{
  font-family:'Syne',sans-serif;font-weight:800;
  font-size:clamp(2rem,5vw,3.2rem);color:#fff;
  line-height:1.1;margin-bottom:12px;position:relative;
}
.hero h1 em{color:var(--red);font-style:normal}
.hero p{color:rgba(255,255,255,.6);font-size:1rem;margin-bottom:0;max-width:480px;margin:0 auto;position:relative}
.hero-wave{
  display:block;width:100%;margin-top:36px;
}

/* ── Layout ── */
.page{max-width:900px;margin:0 auto;padding:0 20px 60px}

/* ── Steps ── */
.steps{display:flex;justify-content:center;gap:0;margin-bottom:36px;padding-top:32px}
.step{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  position:relative;flex:1;max-width:120px;cursor:pointer;
}
.step:not(:last-child)::after{
  content:'';position:absolute;top:18px;left:calc(50% + 18px);
  right:calc(-50% + 18px);height:2px;background:var(--border);
}
.step.done:not(:last-child)::after{background:var(--navy2)}
.step-dot{
  width:36px;height:36px;border-radius:50%;
  background:var(--white);border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:.82rem;font-weight:700;color:var(--txt2);
  transition:.3s;z-index:1;position:relative;
}
.step.active .step-dot{background:var(--navy);border-color:var(--navy);color:#fff;box-shadow:0 0 0 4px rgba(26,58,107,.15)}
.step.done .step-dot{background:var(--navy2);border-color:var(--navy2);color:#fff}
.step-label{font-size:.7rem;font-weight:600;color:var(--txt2);text-align:center}
.step.active .step-label{color:var(--navy);font-weight:700}

/* ── Cards ── */
.screen{display:none;animation:fadeUp .35s ease both}
.screen.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.card{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);padding:28px;margin-bottom:18px;box-shadow:0 2px 12px rgba(15,34,68,.06)}
.card h2{font-family:'Syne',sans-serif;font-weight:700;font-size:1.15rem;margin-bottom:6px}
.card .sub{font-size:.85rem;color:var(--txt2);margin-bottom:22px}

/* ── Options grid ── */
.options{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.opt{
  border:2px solid var(--border);border-radius:12px;padding:16px;
  cursor:pointer;transition:.2s;user-select:none;position:relative;
}
.opt:hover{border-color:var(--navy2);background:#f0f4fb}
.opt.selected{border-color:var(--navy);background:#eef2fb}
.opt.selected::after{
  content:'✓';position:absolute;top:8px;right:10px;
  font-size:.75rem;font-weight:700;color:var(--navy);
}
.opt-icon{font-size:1.6rem;margin-bottom:8px}
.opt-title{font-weight:700;font-size:.9rem;margin-bottom:2px}
.opt-sub{font-size:.76rem;color:var(--txt2)}
.opt-price{font-size:.8rem;font-weight:700;color:var(--navy2);margin-top:6px}
.opt-note{font-size:.68rem;color:var(--txt2);opacity:.75;margin-top:1px}

/* ── Toggle options ── */
.toggles{display:flex;flex-direction:column;gap:10px}
.toggle-opt{
  display:flex;align-items:center;justify-content:space-between;
  border:2px solid var(--border);border-radius:12px;padding:14px 16px;
  cursor:pointer;transition:.2s;
}
.toggle-opt:hover{border-color:var(--navy2)}
.toggle-opt.selected{border-color:var(--navy);background:#eef2fb}
.toggle-left{display:flex;align-items:center;gap:12px}
.toggle-icon{font-size:1.3rem;width:32px;text-align:center}
.toggle-info strong{display:block;font-size:.88rem;font-weight:700}
.toggle-info span{font-size:.76rem;color:var(--txt2)}
.toggle-price{font-size:.85rem;font-weight:700;color:var(--navy2);white-space:nowrap}

/* ── Result card ── */
.result-card{
  background:linear-gradient(135deg,var(--navy),#1a3a6b);
  border-radius:var(--radius);padding:32px;color:#fff;
  margin-bottom:18px;position:relative;overflow:hidden;
}
.result-card::before{
  content:'';position:absolute;top:-40px;right:-40px;
  width:180px;height:180px;border-radius:50%;
  background:rgba(255,255,255,.05);
}
.result-label{font-size:.72rem;font-weight:700;letter-spacing:.12em;opacity:.55;margin-bottom:6px;text-transform:uppercase}
.result-price{
  font-family:'Syne',sans-serif;font-weight:800;
  font-size:clamp(2.4rem,6vw,3.8rem);line-height:1;margin-bottom:4px;
}
.result-range{font-size:.9rem;opacity:.65;margin-bottom:24px}
.result-breakdown{
  background:rgba(255,255,255,.1);border-radius:10px;padding:16px;
  display:flex;flex-direction:column;gap:8px;
}
.result-row{display:flex;justify-content:space-between;font-size:.86rem}
.result-row .name{opacity:.75}
.result-row .val{font-weight:700}
.result-row.total{
  border-top:1px solid rgba(255,255,255,.2);
  padding-top:8px;margin-top:2px;font-weight:700;font-size:.92rem;
}
.result-note{
  font-size:.78rem;opacity:.55;margin-top:16px;line-height:1.6;
}

/* ── CTA ── */
.cta-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:4px}
.btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:13px 22px;border-radius:10px;font-weight:700;font-size:.9rem;
  cursor:pointer;border:none;font-family:'DM Sans',sans-serif;
  transition:.2s;text-decoration:none;
}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{background:#b82020}
.btn-navy{background:var(--navy);color:#fff}.btn-navy:hover{background:var(--navy2)}
.btn-ghost{background:transparent;border:2px solid var(--border);color:var(--txt2)}.btn-ghost:hover{border-color:var(--navy);color:var(--navy)}
.btn-lg{padding:16px 28px;font-size:1rem}
.btn-back{background:transparent;border:none;color:var(--txt2);font-size:.85rem;font-weight:600;cursor:pointer;padding:8px 0;font-family:inherit;display:flex;align-items:center;gap:5px}
.btn-back:hover{color:var(--navy)}

/* ── Nav ── */
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}

/* ── Disclaimer ── */
.disclaimer{
  background:#fff8e8;border:1px solid #f5dc94;border-radius:10px;
  padding:12px 16px;font-size:.78rem;color:#7a5c00;line-height:1.6;
  margin-bottom:18px;
}

/* ── Lang switch ── */
.lang-bar{
  display:flex;justify-content:flex-end;gap:6px;padding:12px 20px;
  max-width:900px;margin:0 auto;
}
.lang-btn{background:none;border:1.5px solid var(--border);border-radius:6px;padding:3px 10px;font-size:.75rem;font-weight:700;cursor:pointer;color:var(--txt2);font-family:inherit}
.lang-btn.active{background:var(--navy);border-color:var(--navy);color:#fff}

@media(max-width:600px){
  .options{grid-template-columns:1fr 1fr}
  .steps{gap:0}
  .step-label{display:none}
  .cta-row{flex-direction:column}
  .btn-lg{justify-content:center}
}
</style>
</head>

  $$('hero-h1').innerHTML = t.heroH1;
  $$('hero-p').textContent = t.heroP;
  ['sl1','sl2','sl3'].forEach((id,i) => { const el=$$(id); if(el) el.textContent=t.sl[i]; });
  $$('s1-title').textContent = t.s1Title;
  $$('s1-sub').textContent   = t.s1Sub;
  $$('s2-title').textContent = t.s2Title;
  $$('s2-sub').textContent   = t.s2Sub;
  $$('btn-s1-next').textContent = t.next;
  $$('btn-s2-next').textContent = t.calc;
  ['back1','back2'].forEach(id => { const el=$$(id); if(el) el.textContent = t.back.replace('← ',''); });
  $$('btn-call').textContent  = t.btnCall;
  $$('btn-write').textContent = t.btnWrite;
  $$('btn-reset').textContent = t.btnReset;
  document.querySelectorAll('[data-l]').forEach(b => b.classList.toggle('active', b.dataset.l === lang));

  renderServices();
  renderExtras();
  if (currentStep === 3) renderResult();
}

function renderServices() {
  const t = T[lang];
  const grid = $$('service-opts');
  if (!grid) return;
  grid.innerHTML = t.services.map(s => `
    <div class="opt ${selectedService===s.id?'selected':''}" onclick="selectService('${s.id}')">
      <div class="opt-icon">${s.icon}</div>
      <div class="opt-title">${s.title}</div>
      <div class="opt-sub">${s.sub}</div>
      <div class="opt-price">alates ${s.base} ${s.unit}</div>
      ${s.note ? '<div class="opt-note">'+s.note+'</div>' : ''}
    </div>`).join('');
}

function renderExtras() {
  const t = T[lang];
  const cont = $$('extra-opts');
  if (!cont) return;
  cont.innerHTML = t.extras.map(e => `
    <div class="toggle-opt ${selectedExtras.has(e.id)?'selected':''}" onclick="toggleExtra('${e.id}')">
      <div class="toggle-left">
        <div class="toggle-icon">${e.icon}</div>
        <div class="toggle-info"><strong>${e.title}</strong><span>${e.sub}</span></div>
      </div>
      <div class="toggle-price">+${e.add} EUR</div>
    </div>`).join('');
}

function renderResult() {
  const t = T[lang];
  if (!selectedService) return;
  const svc = t.services.find(s => s.id === selectedService);
  if (!svc) return;

  let extra_total = 0;
  const rows = [];
  rows.push(`<div class="result-row"><span class="name">${svc.icon} ${svc.title}</span><span class="val">${svc.base} ${svc.unit}</span></div>`);

  t.extras.forEach(e => {
    if (selectedExtras.has(e.id)) {
      extra_total += e.add;
      rows.push(`<div class="result-row"><span class="name">${e.icon} ${e.title}</span><span class="val">+${e.add} EUR</span></div>`);
    }
  });

  const base_min = svc.base + extra_total;
  const base_max = svc.max + extra_total;

  rows.push(`<div class="result-row total"><span class="name">${t.total}</span><span class="val">${base_min}–${base_max} EUR</span></div>`);

  $$('r-label').textContent = t.rLabel;
  $$('r-price').textContent = base_min + ' EUR';
  $$('r-range').textContent = `(${base_min}–${base_max} EUR)`;
  $$('r-breakdown').innerHTML = rows.join('');
  $$('r-note').textContent = t.rNote;
  $$('r-disclaimer').textContent = t.disclaimer;
  $$('btn-write').textContent = t.btnWrite;
  $$('btn-reset').textContent = t.btnReset;
}

// ── Actions ───────────────────────────────────────────
function selectService(id) {
  selectedService = id;
  renderServices();
}

function toggleExtra(id) {
  if (selectedExtras.has(id)) selectedExtras.delete(id);
  else selectedExtras.add(id);
  renderExtras();
}

function goStep(n) {
  if (n === 2 && !selectedService) {
    alert(T[lang].s1Sub + '!');
    return;
  }
  currentStep = n;
  // screens
  document.querySelectorAll('.screen').forEach((s,i) => s.classList.toggle('active', i+1===n));
  // steps
  [1,2,3].forEach(i => {
    const el = $$('step'+i);
    if (!el) return;
    el.classList.toggle('active', i===n);
    el.classList.toggle('done',   i<n);
  });
  if (n === 3) renderResult();
  window.scrollTo({top:0, behavior:'smooth'});
}

function reset() {
  selectedService = null;
  selectedExtras.clear();
  goStep(1);
  render();
}

function setLang(l) {
  lang = l;
  localStorage.setItem('lang', l);
  render();
}

// ── Init ──────────────────────────────────────────────
render();
</script>
</body>
</html>
